name: qr_generator_app
description: "A new Flutter project."
publish_to: 'none'
version: 2026.5.21+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  otp: ^3.2.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  change_app_package_name: ^1.5.0
  # Url para la documentación:
  # https://pub.dev/packages/change_app_package_name
  # dart run change_app_package_name:main com.gaitanivan.flutter.qr_generator_app

flutter:
  uses-material-design: true

flutter_launcher_icons:
  # Url para ver la documentación:
  # https://pub.dev/packages/flutter_launcher_icons
  # dart run flutter_launcher_icons
  android: true
  windows:
    generate: true
    image_path: "assets/icons/checkmark-lock.png"
    icon_size: 48
  image_path: "assets/icons/checkmark-lock.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icons/checkmark-lock.png"

flutter_native_splash:
  # Url para ver la documentación:
  # https://pub.dev/packages/flutter_native_splash
  # dart run flutter_native_splash:create
  color: "#121212" # El fondo oscuro para toda la pantalla

  # Esto es lo que le tuerce el brazo a Android 12 y superior:
  android_12:
    color: "#121212"